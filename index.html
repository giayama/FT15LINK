<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FT15 測試邀請連結產生器 — CLOUDVOCAL</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,400;0,500;1,400&family=Syne:wght@400;500;600;700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0d0f;
  --bg2: #141416;
  --bg3: #1c1c1f;
  --bg4: #242428;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text: #f0ede8;
  --text2: #9b9890;
  --text3: #5c5a56;
  --accent: #c8f060;
  --accent2: #a8d040;
  --accent-dim: rgba(200,240,96,0.08);
  --accent-dim2: rgba(200,240,96,0.15);
  --red: #ff5f5f;
  --red-dim: rgba(255,95,95,0.1);
  --mono: 'DM Mono', monospace;
  --sans: 'DM Sans', sans-serif;
  --display: 'Syne', sans-serif;
  --radius: 10px;
  --radius-lg: 16px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-size: 14px;
  line-height: 1.6;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ── noise texture overlay ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
  opacity: 0.6;
}

/* ── decorative grid ── */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

.page-wrapper {
  position: relative;
  z-index: 1;
  max-width: 640px;
  margin: 0 auto;
  padding: 48px 24px 80px;
}

/* ── Header ── */
header {
  margin-bottom: 48px;
  animation: fadeUp 0.6s ease both;
}

.brand {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 32px;
}

.brand-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 12px var(--accent);
  animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.6; transform: scale(0.8); }
}

.brand-name {
  font-family: var(--display);
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.18em;
  color: var(--text2);
  text-transform: uppercase;
}

h1 {
  font-family: var(--display);
  font-size: clamp(28px, 5vw, 38px);
  font-weight: 700;
  line-height: 1.15;
  letter-spacing: -0.02em;
  color: var(--text);
  margin-bottom: 12px;
}

h1 .accent { color: var(--accent); }

.subtitle {
  font-size: 14px;
  color: var(--text2);
  line-height: 1.7;
  max-width: 480px;
}

/* ── Cards ── */
.card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 28px;
  margin-bottom: 16px;
  animation: fadeUp 0.6s ease both;
  transition: border-color 0.2s;
}

.card:hover { border-color: var(--border2); }
.card:nth-child(2) { animation-delay: 0.1s; }
.card:nth-child(3) { animation-delay: 0.2s; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

.card-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 24px;
}

.step-num {
  width: 28px;
  height: 28px;
  border-radius: 8px;
  background: var(--accent-dim2);
  border: 1px solid rgba(200,240,96,0.2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 500;
  color: var(--accent);
  flex-shrink: 0;
}

.card-title {
  font-family: var(--display);
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  flex: 1;
}

.badge {
  font-family: var(--mono);
  font-size: 10px;
  padding: 3px 8px;
  border-radius: 20px;
  background: var(--bg4);
  color: var(--text3);
  border: 1px solid var(--border);
}

.badge.saved {
  background: var(--accent-dim2);
  color: var(--accent);
  border-color: rgba(200,240,96,0.3);
}

/* ── Form fields ── */
.field { margin-bottom: 14px; }
.field:last-child { margin-bottom: 0; }

label {
  display: block;
  font-size: 12px;
  font-weight: 500;
  color: var(--text2);
  margin-bottom: 6px;
  letter-spacing: 0.04em;
}

label .tag {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--accent);
  background: var(--accent-dim);
  padding: 1px 6px;
  border-radius: 4px;
  margin-left: 6px;
  font-weight: 400;
}

label .dim { color: var(--text3); font-weight: 400; }

input, select {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 14px;
  font-size: 13px;
  font-family: var(--sans);
  color: var(--text);
  outline: none;
  transition: border-color 0.15s, background 0.15s;
  -webkit-appearance: none;
  appearance: none;
}

input:focus, select:focus {
  border-color: rgba(200,240,96,0.4);
  background: var(--bg4);
}

input::placeholder { color: var(--text3); }

input.mono { font-family: var(--mono); font-size: 12px; color: #7dd3fc; }
input.mono::placeholder { color: var(--text3); font-family: var(--mono); }

select {
  background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%235c5a56' stroke-width='1.5' fill='none' stroke-linecap='round'/%3E%3C/svg%3E");
  background-repeat: no-repeat;
  background-position: right 12px center;
  padding-right: 32px;
  cursor: pointer;
}

select option { background: #1c1c1f; }

.row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

.divider {
  height: 1px;
  background: var(--border);
  margin: 20px 0;
}

/* ── Buttons ── */
.btn-row { display: flex; gap: 10px; margin-top: 20px; }

button {
  padding: 10px 20px;
  border-radius: var(--radius);
  font-size: 13px;
  font-weight: 500;
  font-family: var(--sans);
  cursor: pointer;
  transition: all 0.15s;
  border: 1px solid transparent;
  white-space: nowrap;
}

.btn-primary {
  background: var(--accent);
  color: #0d0d0f;
  border-color: var(--accent);
  flex: 1;
}
.btn-primary:hover { background: var(--accent2); transform: translateY(-1px); box-shadow: 0 4px 20px rgba(200,240,96,0.25); }
.btn-primary:active { transform: translateY(0); }

.btn-ghost {
  background: transparent;
  color: var(--text2);
  border-color: var(--border2);
}
.btn-ghost:hover { background: var(--bg3); color: var(--text); }

.btn-save {
  background: transparent;
  color: var(--accent);
  border-color: rgba(200,240,96,0.3);
  font-size: 12px;
  padding: 8px 16px;
}
.btn-save:hover { background: var(--accent-dim2); }

/* ── Result ── */
.result {
  display: none;
  margin-top: 20px;
  padding: 20px;
  background: var(--bg3);
  border: 1px solid rgba(200,240,96,0.2);
  border-radius: var(--radius);
  animation: fadeUp 0.3s ease;
}
.result.show { display: block; }

.result-label {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.08em;
  color: var(--accent);
  margin-bottom: 10px;
  text-transform: uppercase;
}

.url-wrap {
  display: flex;
  gap: 10px;
  align-items: flex-start;
}

.url-text {
  flex: 1;
  font-family: var(--mono);
  font-size: 11px;
  line-height: 1.6;
  color: var(--text2);
  word-break: break-all;
  padding: 10px 12px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
}

.btn-copy {
  background: transparent;
  color: var(--text2);
  border: 1px solid var(--border2);
  font-size: 12px;
  padding: 8px 14px;
  flex-shrink: 0;
}
.btn-copy:hover { background: var(--bg4); color: var(--text); }
.btn-copy.ok { color: var(--accent); border-color: rgba(200,240,96,0.3); }

.result-note {
  font-size: 12px;
  color: var(--text3);
  margin-top: 12px;
  line-height: 1.6;
  padding-top: 12px;
  border-top: 1px solid var(--border);
}

.result-note strong { color: var(--text2); }

/* ── Error ── */
.error-msg {
  display: none;
  font-size: 12px;
  color: var(--red);
  background: var(--red-dim);
  border: 1px solid rgba(255,95,95,0.2);
  border-radius: 8px;
  padding: 8px 12px;
  margin-top: 12px;
}
.error-msg.show { display: block; }

/* ── History ── */
.history-section {
  margin-top: 32px;
  animation: fadeUp 0.6s ease 0.3s both;
}

.history-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}

.history-title {
  font-family: var(--display);
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.1em;
  color: var(--text3);
  text-transform: uppercase;
}

.history-clear {
  font-size: 11px;
  color: var(--text3);
  background: none;
  border: none;
  padding: 4px 8px;
  cursor: pointer;
  border-radius: 6px;
  transition: color 0.15s;
}
.history-clear:hover { color: var(--red); background: var(--red-dim); }

.history-list { display: flex; flex-direction: column; gap: 8px; }

.history-item {
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 16px;
  transition: border-color 0.15s;
}
.history-item:hover { border-color: var(--border2); }

.history-avatar {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  background: var(--accent-dim2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--display);
  font-size: 13px;
  font-weight: 700;
  color: var(--accent);
  flex-shrink: 0;
}

.history-info { flex: 1; min-width: 0; }
.history-name { font-size: 13px; font-weight: 500; color: var(--text); }
.history-meta { font-size: 11px; color: var(--text3); font-family: var(--mono); margin-top: 1px; }

.history-copy {
  font-size: 11px;
  color: var(--text3);
  background: none;
  border: 1px solid var(--border);
  padding: 5px 10px;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.15s;
  flex-shrink: 0;
}
.history-copy:hover { color: var(--accent); border-color: rgba(200,240,96,0.3); background: var(--accent-dim); }
.history-copy.ok { color: var(--accent); border-color: rgba(200,240,96,0.3); }

.empty-history {
  text-align: center;
  padding: 28px;
  color: var(--text3);
  font-size: 13px;
  background: var(--bg2);
  border: 1px dashed var(--border);
  border-radius: var(--radius);
}

/* ── Footer ── */
footer {
  margin-top: 64px;
  padding-top: 24px;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  animation: fadeUp 0.6s ease 0.4s both;
}

.footer-brand {
  font-family: var(--display);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.15em;
  color: var(--text3);
  text-transform: uppercase;
}

.footer-note {
  font-size: 11px;
  color: var(--text3);
  font-family: var(--mono);
}

/* ── Responsive ── */
@media (max-width: 480px) {
  .page-wrapper { padding: 32px 16px 60px; }
  .row { grid-template-columns: 1fr; }
  .btn-row { flex-direction: column; }
  footer { flex-direction: column; gap: 8px; text-align: center; }
}
</style>
</head>
<body>
<div class="page-wrapper">

  <header>
    <div class="brand">
      <div class="brand-dot"></div>
      <span class="brand-name">CLOUDVOCAL · FlashTrack FT15</span>
    </div>
    <h1>測試邀請<br><span class="accent">連結產生器</span></h1>
    <p class="subtitle">為每位測試者產生專屬預填連結。姓名、Email、年資由系統自動帶入，測試者開啟後直接填寫，完全看不到個人資料欄位。</p>
  </header>

  <!-- Step 1: Settings -->
  <div class="card" id="card-settings">
    <div class="card-header">
      <div class="step-num">01</div>
      <div class="card-title">填入表單設定</div>
      <span class="badge" id="badge-saved">未儲存</span>
      <button class="btn-save" onclick="saveSettings()">儲存</button>
    </div>

    <div class="field">
      <label>表單 ID <span class="dim">— 從 Apps Script 執行記錄複製</span></label>
      <input class="mono" id="formId" placeholder="1FAIpQLSxAbc123Def456Ghi789..." oninput="markUnsaved()">
    </div>

    <div class="divider"></div>

    <div class="field">
      <label>S1 姓名的 Entry ID <span class="tag">entry.?</span></label>
      <input class="mono" id="e1" placeholder="只填數字，例：1234567890" oninput="markUnsaved()">
    </div>
    <div class="field">
      <label>S2 Email 的 Entry ID <span class="tag">entry.?</span></label>
      <input class="mono" id="e2" placeholder="只填數字，例：9876543210" oninput="markUnsaved()">
    </div>
    <div class="field">
      <label>S3 使用年資的 Entry ID <span class="tag">entry.?</span></label>
      <input class="mono" id="e3" placeholder="只填數字，例：1122334455" oninput="markUnsaved()">
    </div>
  </div>

  <!-- Step 2: Generate -->
  <div class="card">
    <div class="card-header">
      <div class="step-num">02</div>
      <div class="card-title">產生測試者專屬連結</div>
    </div>

    <div class="row">
      <div class="field">
        <label>姓名 <span style="color:var(--red);font-size:11px">必填</span></label>
        <input id="name" placeholder="例：王小明">
      </div>
      <div class="field">
        <label>Email <span class="dim">選填</span></label>
        <input id="email" type="email" placeholder="例：wang@studio.com">
      </div>
    </div>
    <div class="field">
      <label>使用年資 <span style="color:var(--red);font-size:11px">必填</span></label>
      <select id="exp">
        <option value="">請選擇</option>
        <option>剛開始（&lt;1年）</option>
        <option>1–3年</option>
        <option>3–5年</option>
        <option>5年以上</option>
      </select>
    </div>

    <div class="error-msg" id="errMsg"></div>

    <div class="btn-row">
      <button class="btn-primary" onclick="generate()">產生專屬連結 →</button>
      <button class="btn-ghost" onclick="clearPerson()">清除</button>
    </div>

    <div class="result" id="result">
      <div class="result-label">專屬預填連結</div>
      <div class="url-wrap">
        <div class="url-text" id="urlText"></div>
        <button class="btn-copy" id="copyBtn" onclick="copyUrl()">複製</button>
      </div>
      <div class="result-note">
        測試者點開此連結後，<strong>S1 / S2 / S3 已自動帶入並移至表單末頁</strong>，他們從「使用背景」開始填寫，完全不會看到個人資料欄位。
      </div>
    </div>
  </div>

  <!-- History -->
  <div class="history-section">
    <div class="history-header">
      <div class="history-title">已產生的連結記錄</div>
      <button class="history-clear" onclick="clearHistory()">清除記錄</button>
    </div>
    <div class="history-list" id="historyList">
      <div class="empty-history" id="emptyMsg">尚未產生任何連結</div>
    </div>
  </div>

  <footer>
    <span class="footer-brand">CLOUDVOCAL</span>
    <span class="footer-note">FT15 DSP 麥克風 · 目標上市 2026.06.10</span>
  </footer>

</div>

<script>
var LS_KEY = 'ft15_settings';
var LS_HIST = 'ft15_history';
var history_data = [];

function loadSettings() {
  try {
    var s = JSON.parse(localStorage.getItem(LS_KEY) || '{}');
    if (s.formId) document.getElementById('formId').value = s.formId;
    if (s.e1) document.getElementById('e1').value = s.e1;
    if (s.e2) document.getElementById('e2').value = s.e2;
    if (s.e3) document.getElementById('e3').value = s.e3;
    if (s.formId) markSaved();
  } catch(e) {}
  try {
    history_data = JSON.parse(localStorage.getItem(LS_HIST) || '[]');
    renderHistory();
  } catch(e) {}
}

function saveSettings() {
  var data = {
    formId: document.getElementById('formId').value.trim(),
    e1: document.getElementById('e1').value.trim(),
    e2: document.getElementById('e2').value.trim(),
    e3: document.getElementById('e3').value.trim()
  };
  localStorage.setItem(LS_KEY, JSON.stringify(data));
  markSaved();
}

function markSaved() {
  var b = document.getElementById('badge-saved');
  b.textContent = '已儲存';
  b.classList.add('saved');
}

function markUnsaved() {
  var b = document.getElementById('badge-saved');
  b.textContent = '未儲存';
  b.classList.remove('saved');
}

function clearPerson() {
  document.getElementById('name').value = '';
  document.getElementById('email').value = '';
  document.getElementById('exp').selectedIndex = 0;
  document.getElementById('result').classList.remove('show');
  document.getElementById('errMsg').classList.remove('show');
}

function showError(msg) {
  var el = document.getElementById('errMsg');
  el.textContent = msg;
  el.classList.add('show');
}

function hideError() {
  document.getElementById('errMsg').classList.remove('show');
}

function generate() {
  hideError();
  var formId = document.getElementById('formId').value.trim();
  var e1 = document.getElementById('e1').value.trim();
  var e2 = document.getElementById('e2').value.trim();
  var e3 = document.getElementById('e3').value.trim();
  var name = document.getElementById('name').value.trim();
  var email = document.getElementById('email').value.trim();
  var exp = document.getElementById('exp').value;

  if (!formId || !e1 || !e2 || !e3) {
    showError('請先填入表單 ID 和三個 Entry ID，並點「儲存」。');
    return;
  }
  if (!name) { showError('請填入測試者姓名。'); return; }
  if (!exp) { showError('請選擇使用年資。'); return; }

  var base = 'https://docs.google.com/forms/d/e/' + formId + '/viewform';
  var url = base
    + '?entry.' + e1 + '=' + encodeURIComponent(name)
    + (e2 && email ? '&entry.' + e2 + '=' + encodeURIComponent(email) : '')
    + (e3 && exp ? '&entry.' + e3 + '=' + encodeURIComponent(exp) : '')
    + '&usp=pp_url';

  document.getElementById('urlText').textContent = url;
  document.getElementById('result').classList.add('show');
  document.getElementById('copyBtn').textContent = '複製';
  document.getElementById('copyBtn').classList.remove('ok');

  addHistory(name, email, exp, url);
}

function copyUrl() {
  var url = document.getElementById('urlText').textContent;
  var btn = document.getElementById('copyBtn');
  navigator.clipboard.writeText(url).then(function() {
    btn.textContent = '已複製 ✓';
    btn.classList.add('ok');
    setTimeout(function() { btn.textContent = '複製'; btn.classList.remove('ok'); }, 2000);
  });
}

function addHistory(name, email, exp, url) {
  history_data.unshift({ name: name, email: email, exp: exp, url: url, ts: Date.now() });
  if (history_data.length > 20) history_data = history_data.slice(0, 20);
  localStorage.setItem(LS_HIST, JSON.stringify(history_data));
  renderHistory();
}

function clearHistory() {
  history_data = [];
  localStorage.removeItem(LS_HIST);
  renderHistory();
}

function renderHistory() {
  var list = document.getElementById('historyList');
  var empty = document.getElementById('emptyMsg');
  if (history_data.length === 0) {
    list.innerHTML = '';
    list.appendChild(empty);
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';
  list.innerHTML = '';
  history_data.forEach(function(item, idx) {
    var initials = item.name ? item.name.charAt(0) : '?';
    var date = new Date(item.ts).toLocaleString('zh-TW', { month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' });
    var div = document.createElement('div');
    div.className = 'history-item';
    div.innerHTML =
      '<div class="history-avatar">' + initials + '</div>' +
      '<div class="history-info">' +
        '<div class="history-name">' + escHtml(item.name) + '</div>' +
        '<div class="history-meta">' + escHtml(item.exp) + (item.email ? ' · ' + escHtml(item.email) : '') + ' · ' + date + '</div>' +
      '</div>' +
      '<button class="history-copy" id="hcopy-' + idx + '" onclick="copyHistory(' + idx + ')">複製連結</button>';
    list.appendChild(div);
  });
}

function copyHistory(idx) {
  var url = history_data[idx].url;
  var btn = document.getElementById('hcopy-' + idx);
  navigator.clipboard.writeText(url).then(function() {
    btn.textContent = '已複製 ✓';
    btn.classList.add('ok');
    setTimeout(function() { btn.textContent = '複製連結'; btn.classList.remove('ok'); }, 2000);
  });
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

loadSettings();
</script>
</body>
</html>
